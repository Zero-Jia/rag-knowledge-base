version: "3.9"

services:
  redis:
    image: redis:7
    container_name: rag-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  backend:
    build: .
    container_name: rag-backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./storage:/app/storage
    # 如果你后端代码里是通过环境变量拿 Redis 地址，这里可以覆盖成容器内域名 redis
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379

  frontend:
    build: ./frontend
    container_name: rag-frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend
    environment:
      # 关键：让前端在容器里请求后端时不要写 127.0.0.1（那是它自己）
      - VITE_API_BASE_URL=http://127.0.0.1:8000